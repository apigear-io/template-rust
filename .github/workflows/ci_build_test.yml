# This workflow will ensure that all changes to the goldenmaster are tested

name: Technology Template Build Test

on:
  pull_request:
    paths:
      - 'goldenmaster/**'
    branches: [main]

jobs:
  cargo_test:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Ubuntu Latest", os: ubuntu-latest }
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install latest stable
        uses: actions-rs/toolchain@v1
        with:
            toolchain: stable
            override: true
            components: rustfmt, clippy
      - name: Run cargo clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          # Fail the build on actionable lint groups so generated-code smells block merges.
          # Style/complexity (e.g. clone_on_copy on Copy types) stay non-blocking warnings to
          # avoid noise from intentionally-uniform generated code.
          args: --manifest-path goldenmaster/Cargo.toml --all-targets -- -D clippy::correctness -D clippy::perf -D clippy::suspicious

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --manifest-path goldenmaster/Cargo.toml --all -- --check

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --manifest-path goldenmaster/Cargo.toml

      - name: Run cargo doc
        uses: actions-rs/cargo@v1
        env:
            RUSTDOCFLAGS: "-D warnings"
        with:
          command: doc
          args: --manifest-path goldenmaster/Cargo.toml
